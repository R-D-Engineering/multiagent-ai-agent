version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: langgraph_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Bmw1250GS@#&
      POSTGRES_DB: langgraph_memory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - langgraph_network

  # Streamlit Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph_frontend
    ports:
      - "8501:8501"
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://postgres:Bmw1250GS%40%23%26@postgres:5432/langgraph_memory
      
      # API Keys - Replace with your actual keys or use .env file
      GROQ_API_KEY: ${GROQ_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      AVIATIONSTACK_API_KEY: ${AVIATIONSTACK_API_KEY}
      
      # Streamlit Configuration
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
    
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - langgraph_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  langgraph_network:
    driver: bridge
